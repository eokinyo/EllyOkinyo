<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elly Okinyo - Personal Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; }
        .font-display { font-family: 'Space Grotesk', sans-serif; font-weight: 600; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-item { transition: all 0.2s; }
        .nav-item.active { background-color: #6366f1; color: white; border-radius: 9999px; }
        .task-completed .task-text { text-decoration: line-through; opacity: 0.7; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex">
    <!-- Sidebar -->
    <div class="w-72 bg-white border-r border-slate-200 flex flex-col">
        <div class="p-6 border-b">
            <h1 class="text-3xl font-display tracking-tight text-slate-900">Personal Hub</h1>
            <p class="text-slate-500 text-sm mt-1">Daily life • Portfolio • CV</p>
        </div>
        
        <nav class="flex-1 p-4 space-y-1">
            <button onclick="switchTab(0)" id="nav-0" class="nav-item active w-full text-left px-5 py-3 flex items-center gap-3 text-slate-700 hover:bg-slate-50">
                <i class="fa-solid fa-list-check"></i> Daily Tasks
            </button>
            <button onclick="switchTab(1)" id="nav-1" class="nav-item w-full text-left px-5 py-3 flex items-center gap-3 text-slate-700 hover:bg-slate-50">
                <i class="fa-solid fa-briefcase"></i> Portfolio
            </button>
            <button onclick="switchTab(2)" id="nav-2" class="nav-item w-full text-left px-5 py-3 flex items-center gap-3 text-slate-700 hover:bg-slate-50">
                <i class="fa-solid fa-user"></i> CV / Profile
            </button>
        </nav>
        
        <div class="p-4 border-t text-xs text-slate-400">
            Data saved in browser • Built with ❤️
        </div>
    </div>

    <!-- Main Content -->
    <div class="flex-1 overflow-auto">
        <!-- Daily Tasks -->
        <div id="content-0" class="tab-content active p-8 max-w-3xl">
            <h2 class="text-4xl font-semibold mb-2">Daily Tasks &amp; Plans</h2>
            <p class="text-slate-500 mb-8">Stay organized</p>
            
            <!-- Add Task Form -->
            <div class="bg-white rounded-3xl p-6 shadow-sm border mb-8">
                <div class="grid grid-cols-12 gap-4">
                    <input id="task-input" type="text" class="col-span-5 px-4 py-3 border rounded-2xl focus:outline-none focus:border-indigo-400" placeholder="What needs to be done?">
                    <input id="due-date" type="date" class="col-span-3 px-4 py-3 border rounded-2xl focus:outline-none focus:border-indigo-400">
                    <select id="priority" class="col-span-2 px-4 py-3 border rounded-2xl focus:outline-none focus:border-indigo-400">
                        <option value="high">High</option>
                        <option value="medium" selected>Medium</option>
                        <option value="low">Low</option>
                    </select>
                    <button onclick="addTask()" class="col-span-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-2xl font-medium">Add</button>
                </div>
            </div>

            <div id="tasks-container" class="space-y-3"></div>
        </div>

        <!-- Portfolio -->
        <div id="content-1" class="tab-content p-8">
            <div class="max-w-5xl mx-auto">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-4xl font-semibold">Portfolio</h2>
                    <button onclick="addSamplePortfolio()" class="bg-indigo-600 text-white px-6 py-3 rounded-2xl flex items-center gap-2 hover:bg-indigo-700">
                        <i class="fa-solid fa-plus"></i> Add Project
                    </button>
                </div>
                <div id="portfolio-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
            </div>
        </div>

        <!-- CV / Profile -->
        <div id="content-2" class="tab-content p-8 max-w-3xl">
            <h2 class="text-4xl font-semibold mb-8">CV / Profile</h2>
            
            <div class="bg-white rounded-3xl p-8 shadow-sm border mb-8">
                <h3 class="text-xl font-semibold mb-4">Professional Summary</h3>
                <textarea id="summary" class="w-full h-32 p-4 border rounded-2xl">Passionate developer and problem-solver with experience building useful tools and web applications. Always learning and creating.</textarea>
                <button onclick="alert('Summary saved (demo)')" class="mt-4 bg-slate-800 text-white px-6 py-2 rounded-2xl">Save Summary</button>
            </div>
            
            <h3 class="text-xl font-semibold mb-4">Experience</h3>
            <div id="experience-list" class="space-y-6"></div>
        </div>
    </div>

    <script>
        // Tab switching
        function switchTab(n) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(`content-${n}`).classList.add('active');
            document.querySelectorAll('.nav-item').forEach((el, i) => el.classList.toggle('active', i === n));
        }

        // === Daily Tasks ===
        let tasks = [];
        function loadTasks() {
            const saved = localStorage.getItem('tasks');
            if (saved) tasks = JSON.parse(saved);
            else {
                tasks = [
                    {id:1, text:"Finish project proposal", dueDate:"2026-07-18", priority:"high", completed:false},
                    {id:2, text:"Review code for dashboard", dueDate:"2026-07-17", priority:"medium", completed:true},
                    {id:3, text:"Daily learning session", dueDate:"2026-07-19", priority:"low", completed:false}
                ];
            }
            renderTasks();
        }
        function saveTasks() { localStorage.setItem('tasks', JSON.stringify(tasks)); }
        function renderTasks() {
            const container = document.getElementById('tasks-container');
            container.innerHTML = '';
            tasks.forEach(task => {
                const div = document.createElement('div');
                div.className = `bg-white border rounded-3xl p-5 flex items-center gap-4 task-completed ${task.completed ? 'task-completed' : ''}`;
                div.innerHTML = `
                    <input type="checkbox" ${task.completed ? 'checked' : ''} onchange="toggleTask(${task.id})" class="w-5 h-5 accent-indigo-600">
                    <div class="flex-1">
                        <div class="font-medium ${task.completed ? 'line-through text-slate-500' : ''}">${task.text}</div>
                        <div class="text-sm text-slate-500">${task.dueDate ? 'Due ' + task.dueDate : ''}</div>
                    </div>
                    <span class="px-3 py-1 text-xs rounded-full ${task.priority==='high'?'bg-red-100 text-red-700':task.priority==='medium'?'bg-amber-100 text-amber-700':'bg-slate-100 text-slate-600'}">${task.priority}</span>
                    <button onclick="deleteTask(${task.id})" class="text-slate-400 hover:text-red-500"><i class="fa-solid fa-trash"></i></button>
                `;
                container.appendChild(div);
            });
        }
        function addTask() {
            const text = document.getElementById('task-input').value.trim();
            if (!text) return;
            const newTask = {
                id: Date.now(),
                text,
                dueDate: document.getElementById('due-date').value,
                priority: document.getElementById('priority').value,
                completed: false
            };
            tasks.unshift(newTask);
            saveTasks();
            renderTasks();
            document.getElementById('task-input').value = '';
        }
        function toggleTask(id) {
            const task = tasks.find(t => t.id === id);
            if (task) task.completed = !task.completed;
            saveTasks();
            renderTasks();
        }
        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            saveTasks();
            renderTasks();
        }

        // === Portfolio ===
        let portfolio = [];
        function renderPortfolio() {
            const grid = document.getElementById('portfolio-grid');
            grid.innerHTML = '';
            const samples = [
                {title: "Personal Dashboard", desc: "Task manager + portfolio site built with vanilla JS", link: "#", status: "Live"},
                {title: "Another Project", desc: "Description of your second project", link: "#", status: "In Progress"}
            ];
            samples.forEach(p => {
                const card = document.createElement('div');
                card.className = "bg-white border rounded-3xl p-6 hover:shadow-md transition";
                card.innerHTML = `
                    <h4 class="font-semibold text-lg">${p.title}</h4>
                    <p class="text-slate-600 mt-2">${p.desc}</p>
                    <div class="mt-4 flex justify-between items-center">
                        <a href="${p.link}" class="text-indigo-600 text-sm font-medium">View →</a>
                        <span class="text-xs px-3 py-1 bg-emerald-100 text-emerald-700 rounded-full">${p.status}</span>
                    </div>
                `;
                grid.appendChild(card);
            });
        }
        function addSamplePortfolio() {
            alert("In a full version this would open a form. For now, sample data is shown above.");
            renderPortfolio();
        }

        // === CV Experience Samples ===
        function renderExperience() {
            const list = document.getElementById('experience-list');
            list.innerHTML = `
                <div class="bg-white border rounded-3xl p-6">
                    <div class="font-semibold">Software Developer • Company Name</div>
                    <div class="text-sm text-slate-500">2024 - Present</div>
                    <ul class="mt-3 list-disc pl-5 space-y-1 text-slate-600">
                        <li>Built internal tools and dashboards</li>
                        <li>Improved user experience for key features</li>
                    </ul>
                </div>
            `;
        }

        // Init
        window.onload = () => {
            loadTasks();
            renderPortfolio();
            renderExperience();
            switchTab(0);
        };
    </script>
</body>
</html>

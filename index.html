<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elly Okinyo - Personal Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @media print {
            .no-print { display: none !important; }
            body { background: white; }
        }
        body { font-family: 'Inter', system_ui, sans-serif; }
        .font-display { font-family: 'Space Grotesk', sans-serif; font-weight: 600; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <div class="flex flex-col md:flex-row h-screen">
        <!-- Sidebar / Nav -->
        <div id="sidebar" class="md:w-72 bg-white border-r md:border-r border-slate-200 flex flex-col">
            <div class="p-6 border-b">
                <h1 class="text-3xl font-display tracking-tight">Personal Hub</h1>
            </div>
            <nav id="nav-container" class="flex-1 p-4 flex md:flex-col gap-1 overflow-x-auto"></nav>
        </div>

        <!-- Main -->
        <div class="flex-1 overflow-auto p-4 md:p-8">
            <!-- Daily Tasks (full mode only) -->
            <div id="content-0" class="tab-content max-w-3xl mx-auto">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-3xl font-semibold">Daily Tasks</h2>
                </div>
                <!-- Add form + list (same as before) -->
                <div class="bg-white rounded-3xl p-5 shadow-sm border mb-8">
                    <div class="grid grid-cols-1 sm:grid-cols-12 gap-3">
                        <input id="task-input" type="text" class="sm:col-span-5 px-4 py-3 border rounded-2xl" placeholder="New task...">
                        <input id="due-date" type="date" class="sm:col-span-3 px-4 py-3 border rounded-2xl">
                        <select id="priority" class="sm:col-span-2 px-4 py-3 border rounded-2xl">
                            <option value="high">High</option><option value="medium" selected>Medium</option><option value="low">Low</option>
                        </select>
                        <button onclick="addTask()" class="sm:col-span-2 bg-indigo-600 text-white rounded-2xl">Add</button>
                    </div>
                </div>
                <div id="tasks-container" class="space-y-3"></div>
            </div>

            <!-- Portfolio -->
            <div id="content-1" class="tab-content max-w-5xl mx-auto">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-3xl font-semibold">Portfolio</h2>
                    ${isFullMode ? `<button onclick="showAddProjectForm()" class="bg-indigo-600 text-white px-5 py-2 rounded-2xl text-sm">+ New Project</button>` : ''}
                </div>
                <div id="portfolio-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
            </div>

            <!-- CV -->
            <div id="content-2" class="tab-content max-w-3xl mx-auto">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-3xl font-semibold">CV / Profile</h2>
                    <button onclick="window.print()" class="no-print bg-emerald-600 text-white px-5 py-2 rounded-2xl text-sm flex items-center gap-2">
                        <i class="fa-solid fa-download"></i> Export PDF
                    </button>
                </div>
                <!-- Summary + Experience (samples) -->
                <div class="bg-white rounded-3xl p-8 shadow-sm border">
                    <h3 class="font-semibold text-lg mb-3">Professional Summary</h3>
                    <p id="summary-text" class="text-slate-600">Passionate builder of useful tools. Always learning.</p>
                </div>
                <!-- More CV sections can be expanded later -->
            </div>
        </div>
    </div>

    <!-- Simple Project Add Form (modal style) -->
    <div id="project-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center">
        <div class="bg-white rounded-3xl p-6 w-full max-w-md mx-4">
            <h3 class="font-semibold mb-4">Add New Project</h3>
            <input id="proj-title" class="w-full border rounded-2xl px-4 py-3 mb-3" placeholder="Project Title">
            <textarea id="proj-desc" class="w-full border rounded-2xl px-4 py-3 h-24" placeholder="Short description"></textarea>
            <div class="flex gap-3 mt-6">
                <button onclick="hideProjectModal()" class="flex-1 py-3 border rounded-2xl">Cancel</button>
                <button onclick="saveNewProject()" class="flex-1 py-3 bg-indigo-600 text-white rounded-2xl">Add Project</button>
            </div>
        </div>
    </div>

    <script>
        const isFullMode = new URLSearchParams(window.location.search).get('full') === 'true';

        // Nav
        function renderNav() {
            const nav = document.getElementById('nav-container');
            nav.innerHTML = `
                ${isFullMode ? `<button onclick="switchTab(0)" class="nav-item px-5 py-3 text-left flex items-center gap-3 hover:bg-slate-50" id="nav-0"><i class="fa-solid fa-list-check"></i> Daily Tasks</button>` : ''}
                <button onclick="switchTab(1)" class="nav-item px-5 py-3 text-left flex items-center gap-3 hover:bg-slate-50 ${!isFullMode?'active':''}" id="nav-1"><i class="fa-solid fa-briefcase"></i> Portfolio</button>
                <button onclick="switchTab(2)" class="nav-item px-5 py-3 text-left flex items-center gap-3 hover:bg-slate-50" id="nav-2"><i class="fa-solid fa-user"></i> CV / Profile</button>
            `;
        }

        function switchTab(n) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(`content-${n}`).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            const activeNav = document.getElementById(`nav-${n}`);
            if (activeNav) activeNav.classList.add('active');
        }

        // Tasks, Portfolio, CV logic (working add for portfolio in full mode)
        let tasks = [{id:1, text:"Sample task - edit me", dueDate:"2026-07-20", priority:"medium", completed:false}];
        // ... (full tasks functions same as previous)

        let portfolioItems = [
            {title: "Personal Dashboard", desc: "Task manager + portfolio site on GitHub Pages"}
        ];

        function renderPortfolio() {
            const grid = document.getElementById('portfolio-grid');
            grid.innerHTML = portfolioItems.map((p,i) => `
                <div class="bg-white border rounded-3xl p-6">
                    <h4 class="font-semibold">${p.title}</h4>
                    <p class="text-slate-600 text-sm mt-2">${p.desc}</p>
                </div>
            `).join('');
        }

        function showAddProjectForm() {
            document.getElementById('project-modal').classList.remove('hidden');
        }
        function hideProjectModal() {
            document.getElementById('project-modal').classList.add('hidden');
        }
        function saveNewProject() {
            const title = document.getElementById('proj-title').value.trim();
            const desc = document.getElementById('proj-desc').value.trim();
            if (title) {
                portfolioItems.unshift({title, desc});
                renderPortfolio();
            }
            hideProjectModal();
        }

        // Init
        window.onload = () => {
            renderNav();
            renderPortfolio();
            // loadTasks + renderTasks etc.
            switchTab(isFullMode ? 0 : 1);
        };
    </script>
</body>
</html>

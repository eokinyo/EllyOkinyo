<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elly Okinyo - Personal Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; }
        .font-display { font-family: 'Space Grotesk', sans-serif; font-weight: 600; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-item { transition: all 0.2s; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <div class="flex flex-col md:flex-row h-screen">
        <!-- Sidebar / Top Nav -->
        <div id="sidebar" class="md:w-72 bg-white border-r md:border-r border-slate-200 flex flex-col">
            <div class="p-6 border-b">
                <h1 class="text-3xl font-display tracking-tight text-slate-900">Personal Hub</h1>
                <p class="text-slate-500 text-sm mt-1">Daily life • Portfolio • CV</p>
            </div>
            
            <nav id="nav-container" class="flex-1 p-4 space-y-1 md:space-y-1 flex md:flex-col overflow-x-auto md:overflow-x-visible">
                <!-- Populated by JS based on public/full mode -->
            </nav>
            
            <div class="p-4 border-t text-xs text-slate-400 hidden md:block">
                Data saved in browser
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-1 overflow-auto p-4 md:p-8">
            <!-- Daily Tasks -->
            <div id="content-0" class="tab-content active max-w-3xl mx-auto">
                <h2 class="text-3xl md:text-4xl font-semibold mb-2">Daily Tasks &amp; Plans</h2>
                <p class="text-slate-500 mb-6">Stay organized</p>
                
                <div class="bg-white rounded-3xl p-5 md:p-6 shadow-sm border mb-8">
                    <div class="grid grid-cols-1 sm:grid-cols-12 gap-3">
                        <input id="task-input" type="text" class="sm:col-span-5 px-4 py-3 border rounded-2xl focus:outline-none focus:border-indigo-400 text-sm" placeholder="What needs to be done?">
                        <input id="due-date" type="date" class="sm:col-span-3 px-4 py-3 border rounded-2xl focus:outline-none focus:border-indigo-400">
                        <select id="priority" class="sm:col-span-2 px-4 py-3 border rounded-2xl focus:outline-none focus:border-indigo-400">
                            <option value="high">High</option>
                            <option value="medium" selected>Medium</option>
                            <option value="low">Low</option>
                        </select>
                        <button onclick="addTask()" class="sm:col-span-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-2xl font-medium py-3">Add Task</button>
                    </div>
                </div>

                <div id="tasks-container" class="space-y-3"></div>
            </div>

            <!-- Portfolio -->
            <div id="content-1" class="tab-content max-w-5xl mx-auto">
                <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8">
                    <h2 class="text-3xl md:text-4xl font-semibold">Portfolio</h2>
                    <button onclick="addSamplePortfolio()" class="bg-indigo-600 text-white px-6 py-3 rounded-2xl flex items-center gap-2 hover:bg-indigo-700 text-sm whitespace-nowrap">
                        <i class="fa-solid fa-plus"></i> Add Project
                    </button>
                </div>
                <div id="portfolio-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
            </div>

            <!-- CV -->
            <div id="content-2" class="tab-content max-w-3xl mx-auto">
                <h2 class="text-3xl md:text-4xl font-semibold mb-8">CV / Profile</h2>
                
                <div class="bg-white rounded-3xl p-6 md:p-8 shadow-sm border mb-8">
                    <h3 class="text-xl font-semibold mb-4">Professional Summary</h3>
                    <textarea id="summary" class="w-full h-32 p-4 border rounded-2xl focus:outline-none focus:border-indigo-300">Passionate about building useful tools and solving problems. Open to opportunities and collaborations.</textarea>
                    <button onclick="alert('Summary saved! (demo)')" class="mt-4 bg-slate-800 text-white px-6 py-2.5 rounded-2xl text-sm">Save Summary</button>
                </div>
                
                <h3 class="text-xl font-semibold mb-4">Experience</h3>
                <div id="experience-list" class="space-y-6"></div>
            </div>
        </div>
    </div>

    <script>
        const isFullMode = new URLSearchParams(window.location.search).get('full') === 'true';

        // Navigation items
        function renderNav() {
            const nav = document.getElementById('nav-container');
            nav.innerHTML = `
                ${isFullMode ? `<button onclick="switchTab(0)" class="nav-item px-5 py-3 md:w-full text-left flex items-center gap-3 text-slate-700 hover:bg-slate-50 active" id="nav-0"><i class="fa-solid fa-list-check"></i><span class="hidden md:inline">Daily Tasks</span></button>` : ''}
                <button onclick="switchTab(1)" class="nav-item px-5 py-3 md:w-full text-left flex items-center gap-3 text-slate-700 hover:bg-slate-50 ${!isFullMode ? 'active' : ''}" id="nav-1"><i class="fa-solid fa-briefcase"></i><span class="hidden md:inline">Portfolio</span></button>
                <button onclick="switchTab(2)" class="nav-item px-5 py-3 md:w-full text-left flex items-center gap-3 text-slate-700 hover:bg-slate-50" id="nav-2"><i class="fa-solid fa-user"></i><span class="hidden md:inline">CV / Profile</span></button>
            `;
        }

        function switchTab(n) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(`content-${n}`).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`nav-${n}`).classList.add('active');
        }

        // Tasks (same as before with samples)
        let tasks = [];
        function loadTasks() {
            const saved = localStorage.getItem('tasks');
            if (saved) tasks = JSON.parse(saved);
            else tasks = [{id:1,text:"Finish project proposal",dueDate:"2026-07-20",priority:"high",completed:false}];
            renderTasks();
        }
        function saveTasks() { localStorage.setItem('tasks', JSON.stringify(tasks)); }
        function renderTasks() {
            const container = document.getElementById('tasks-container');
            container.innerHTML = tasks.length ? '' : '<p class="text-slate-500">No tasks yet. Add one above!</p>';
            tasks.forEach(task => {
                const div = document.createElement('div');
                div.className = `bg-white border rounded-3xl p-5 flex items-center gap-4 ${task.completed ? 'opacity-75' : ''}`;
                div.innerHTML = `
                    <input type="checkbox" ${task.completed?'checked':''} onchange="toggleTask(${task.id})" class="w-5 h-5 accent-indigo-600">
                    <div class="flex-1">
                        <div class="${task.completed ? 'line-through' : ''}">${task.text}</div>
                        ${task.dueDate ? `<div class="text-xs text-slate-500">Due ${task.dueDate}</div>` : ''}
                    </div>
                    <span class="text-xs px-3 py-1 rounded-full ${task.priority==='high'?'bg-red-100 text-red-700': 'bg-amber-100 text-amber-700'}">${task.priority}</span>
                `;
                container.appendChild(div);
            });
        }
        function addTask() {
            const text = document.getElementById('task-input').value.trim();
            if (!text) return;
            tasks.unshift({id:Date.now(), text, dueDate:document.getElementById('due-date').value, priority:document.getElementById('priority').value, completed:false});
            saveTasks();
            renderTasks();
            document.getElementById('task-input').value = '';
        }
        function toggleTask(id) {
            const t = tasks.find(x=>x.id===id);
            if (t) t.completed = !t.completed;
            saveTasks();
            renderTasks();
        }

        // Portfolio & CV samples (as before)
        function renderPortfolio() {
            const grid = document.getElementById('portfolio-grid');
            grid.innerHTML = `
                <div class="bg-white border rounded-3xl p-6">
                    <h4 class="font-semibold">Personal Dashboard</h4>
                    <p class="text-slate-600 mt-1 text-sm">Task + portfolio hub built with HTML/JS</p>
                    <div class="mt-4 text-emerald-600 text-sm">Live on GitHub Pages</div>
                </div>
                <!-- More cards can be added here -->
            `;
        }
        function addSamplePortfolio() { alert("Add form would go here in a fuller version."); renderPortfolio(); }

        function renderExperience() {
            document.getElementById('experience-list').innerHTML = `
                <div class="bg-white border rounded-3xl p-6">
                    <div class="font-semibold">Your Role • Company</div>
                    <div class="text-sm text-slate-500">2024 – Present</div>
                    <p class="mt-3 text-slate-600">Building useful digital tools and learning every day.</p>
                </div>
            `;
        }

        // Init
        window.onload = () => {
            renderNav();
            loadTasks();
            renderPortfolio();
            renderExperience();
            switchTab(isFullMode ? 0 : 1); // Start on Portfolio for public, Tasks for full
        };
    </script>
</body>
</html>
